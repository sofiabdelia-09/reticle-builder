<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constructor de Retículas</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1>Constructor de Retículas</h1>
        <div class="topbar-actions">
          <button id="reset" type="button">Restablecer</button>
          <label class="import-label">
            Cargar
            <input id="import-json" type="file" accept="application/json" hidden />
          </label>
          <button id="export-json" type="button">Guardar config</button>
          <button id="export-svg" type="button">Exportar SVG</button>
          <button id="export-png" type="button" class="primary">Exportar PNG</button>
        </div>
      </header>
      <main class="layout">
        <section class="stage">
          <div id="preview" class="preview"></div>
          <p id="info" class="info"></p>
        </section>
        <aside class="controls" id="controls"></aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
